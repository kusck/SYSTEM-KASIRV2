<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#047857" />
    <title>PASUNDAN POS Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f8f6;
        color: #0b1a13;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid rgba(16, 185, 129, 0.14);
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 16px 42px rgba(11, 26, 19, 0.08);
        padding: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #4e6157;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PASUNDAN POS sedang offline</h1>
      <p>Periksa koneksi internet lalu buka kembali aplikasi. Data transaksi membutuhkan koneksi ke server.</p>
    </main>
  </body>
</html>
